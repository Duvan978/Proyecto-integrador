<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/style.css">
    <title>Formulario</title>
</head>
<body>
     <!--Formularios-->
    <section class="fregistro">
    <fieldset>
        <legend class="green">Registro graduado</legend>

    <form action="/resul.html" method="get" >

        <label  for="nombre">Nombres:</label>
        <input type="" name="nombre" required><br><br>

        <label for="apellido">Apellidos</label>
        <input type="text" name="apellido" required><br><br>


            <label for="universida">Universidad:</label>
            <select name="universidad" id="">
            <option value=""></option>
            <option value="">Cesde</option>
            <option value="">Universidad de Medellin</option>
            <option value="">Universidad de Antioquia</option>
            <option value="">Universidad Pacual Bravo</option>
            <option value="">Universidad Luis Amigo</option>
            <option value="">Universidad Coperativa de Colombia</option>

        </select><br><br>
        

        <label for action="contacto">Contacto WhatsApp:</label>
        <input type="text" name="contacto"required><br><br>

        <label for="correo">Email:</label>
        <input type="email" name="correo"><br><br>

        <label for="mensaje">Mensaje</label>
        <textarea name="mensaje" id="" ></textarea><br><br>

        <label for="contraseña">Contraseña</label>
        <input type="password" name="contrasena"><br><br>
        
        <button class="boton" type="reset">Cancelar</button>
        <button class="boton" type="submit">Enviar</button>
    </form>
    </fieldset>
    </section>
    <br><br>

<section class="fcodigo">

    <fieldset>
        <legend class="blue">Código</legend>
        <form>
            <label for="nombre">Nombres:</label>
            <input type="text" name="nombre" required><br><br>
    

            <label for="apellido">Apellidos</label>
            <input type="text" name="apellido" required><br><br>
            
            <label for action="contacto">Contacto WhatsApp:</label>
            <input type="text" name="contacto"required><br><br>

            <button class="boton" type="submit">Generar Código</button>   
        </form>

    </fieldset>
</section><br><br>
 
<section class="fgaleria"> 
    <fieldset>
        
        <legend class="purple">Galería</legend>
        <form>
            <!--este codigo debe llevar a una galeria donde se seleccionan las fotografias para descargar-->
            <label for="codigo">Ingresar Codigo:</label>
            <input type="text" name="codigo"><br><br>
            <label for="Seleccionar fotografias">seleccion Fotografias</label>
            <input type="Fotografias" id="">
            <option value=""></option>
            <br><br>

            <button class="boton" type="submit">Enviar</button>
            <button class="boton" type="limpiar">borrar</button>

        </form>
    </fieldset>
    </section><br><br>
    

    <section class="fdescarga">
    <fieldset>
        <legend class="orangered">Descarga</legend>
        <form>
            <!-- en el boton descarga el usuario puede descargar sus fotografiaas al pagar el valor 
             delas fotografias seleccionadas-->
             <label for="descarga">Nombre completo</label>
             <input type="text" name="nombre"><br><br>
             <label for="Ingrese su codigo">Codigo</label>
             <input type="text" name="codigo"><br><br>
             
             <button class="boton" type="submit">Descargar</button>


        </form>
    </fieldset>
    </section>





</body>
</html>
